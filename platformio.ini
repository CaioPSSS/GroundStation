; PlatformIO Project Configuration File for Ground Control Station
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Build Configuration
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_BT_BLE_ENABLED=0
    -DCONFIG_BT_SCO_ENABLED=0
    -DCONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=1

; Upload Configuration
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Library Dependencies
lib_deps = 
    ; Async WebServer and WebSocket
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    
    ; LoRa Communication
    sandeepmistry/LoRa@^1.0.6
    
    ; Gamepad Support (Bluepad32)
    ricardoquesada/Bluepad32@^3.2.0
    
    ; JSON Processing
    bblanchon/ArduinoJson@^6.21.3
    
    ; File System
    esp32-arduino/LittleFS@^2.0.0

; Partition Scheme for LittleFS
board_build.partitions = huge_app.csv

; Memory Configuration
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 40000000L
board_build.flash_mode = qio

; OTA Configuration (optional)
upload_protocol = esptool
upload_port = /dev/ttyUSB0 ; Change for your system
upload_flags = 
    --flash_mode dio
    --flash_freq 40m
    --flash_size 4MB
