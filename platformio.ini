[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 1. Override the standard framework with the Bluepad32-enabled core
platform_packages = 
    framework-arduinoespressif32 @ https://github.com/maxgerhardt/pio-framework-bluepad32/archive/refs/heads/main.zip

; Build Configuration
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUHAL_LOG_COLORS
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_BT_BLE_ENABLED=0
    -DCONFIG_BT_SCO_ENABLED=0
    -DCONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=1

; Upload Configuration
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Library Dependencies
lib_deps = 
    ; Async WebServer and WebSocket
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    
    ; LoRa Communication
    sandeepmistry/LoRa@^0.8.0
    
    ; JSON Processing
    bblanchon/ArduinoJson@^6.21.3
    
    ; NOTE: Bluepad32 is removed here because it is now built into the core framework above!
    ; NOTE: LittleFS is also removed because it is already built natively into the ESP32 core.

; Partition Scheme for LittleFS
board_build.partitions = huge_app.csv

; Memory Configuration
board_build.arduino.memory_type = qio_opi
board_build.f_flash = 40000000L
board_build.flash_mode = qio